<!DOCTYPE html>

<head>

    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <nav>
        <div class="left">
            <img src="https://uhf.microsoft.com/images/microsoft/RE1Mu3b.png" alt="Microsoft">

            <a href="#"> Copilot </a>

        </div>

    <section>

                alt="Microsoft">
            <a href="#">Get Windows 11</a>
        </div>
        <div class="fourth">
            <img src="https://cdn-dynmedia-1.microsoft.com/is/content/microsoftcorp/Link-List-Icons-Surface-Devices?wid=40&hei=40"
